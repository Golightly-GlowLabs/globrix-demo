<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GloBrix</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
</head>
<body>
<video id="vid" muted playsinline autoplay></video>

<script>
const BASE = "https://pub-97d11057786548c6948476edd0bc17eb.r2.dev/";

const CLIPS = [
  "GamerGirl2.mp4",
  "GamerGirl4.mp4",
  "SapphireRoom.mp4",
  "TarotTrailer.mp4",
];

let current = 0;
const vid = document.getElementById("vid");

function playNext() {
  vid.src = BASE + CLIPS[current];
  vid.play().catch(() => {});
}

vid.addEventListener("ended", () => {
  current = (current + 1) % CLIPS.length;
  playNext();
});

playNext();
</script>
</body>
