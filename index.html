<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GloBrix — Live Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e4f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(160,120,255,0.2);
    background: rgba(10,8,20,0.95);
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #c4a5ff;
  }
  .logo span { color: #7b5ea7; font-weight: 400; }

  .pill {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7b5ea7;
    border: 1px solid rgba(160,120,255,0.3);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #05040d;
    overflow: hidden;
  }

  #vid {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }

  .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: rgba(160,120,255,0.4);
  }

  .placeholder-icon {
    width: 64px; height: 64px;
    border: 2px dashed rgba(160,120,255,0.3);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }

  .placeholder p {
    font-size: 13px;
    text-align: center;
    max-width: 260px;
    line-height: 1.6;
  }

  .clip-label {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,8,20,0.8);
    border: 1px solid rgba(160,120,255,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: #c4a5ff;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }

  .progress-bar-track {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(160,120,255,0.15);
    z-index: 10;
  }
  .progress-bar-fill {
    height: 100%;
    background: #9b72f0;
    width: 0%;
    transition: width 0.25s linear;
  }

  footer {
    flex-shrink: 0;
    padding: 10px 20px 12px;
    background: rgba(10,8,20,0.95);
    border-top: 1px solid rgba(160,120,255,0.15);
  }

  .thumb-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .thumb {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: border-color 0.2s, background 0.2s;
    min-width: 80px;
  }

  .thumb:hover { background: rgba(160,120,255,0.08); border-color: rgba(160,120,255,0.25); }
  .thumb.active { border-color: #9b72f0; background: rgba(155,114,240,0.12); }

  .thumb-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid rgba(160,120,255,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: #a080e0;
    transition: background 0.2s, border-color 0.2s;
  }

  .thumb.active .thumb-num {
    background: #9b72f0;
    border-color: #9b72f0;
    color: #fff;
  }

  .thumb-title {
    font-size: 10px;
    color: #7b6a9a;
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }

  .thumb.active .thumb-title { color: #c4a5ff; }

  .timer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 8px;
  }

  .timer-label {
    font-size: 11px;
    color: rgba(160,120,255,0.45);
    letter-spacing: 0.06em;
  }

  .timer-select {
    background: transparent;
    border: 1px solid rgba(160,120,255,0.25);
    color: #c4a5ff;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
  }
  .timer-select option { background: #0a0a0f; }

  .btn-playpause {
    background: transparent;
    border: 1px solid rgba(160,120,255,0.3);
    color: #a080e0;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 3px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-playpause:hover { background: rgba(160,120,255,0.1); }
</style>
</head>
<body>

<header>
  <div class="logo">GloBrix <span>/ Live Demo</span></div>
  <div class="pill">Second Life</div>
</header>

<div class="stage">
  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">▶</div>
    <p>Loading GloBrix demo...</p>
  </div>
  <video id="vid" muted playsinline></video>
  <div class="clip-label" id="clipLabel"></div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
</div>

<footer>
  <div class="thumb-row" id="thumbRow"></div>
  <div class="timer-row">
    <span class="timer-label">Rotate every</span>
    <select class="timer-select" id="durationSelect">
      <option value="10">10 s</option>
      <option value="15">15 s</option>
      <option value="20" selected>20 s</option>
      <option value="30">30 s</option>
      <option value="45">45 s</option>
      <option value="60">60 s</option>
    </select>
    <button class="btn-playpause" id="btnPlay">⏸ Pause</button>
  </div>
</footer>

<script>
const BASE = "https://pub-97d11057786548c6948476edd0bc17eb.r2.dev/";

const CLIPS = [
  { title: "Gamer Girl in Pink",    file: "GamerGirl2.mp4"   },
  { title: "Gamer Girl Moods",      file: "GamerGirl4.mp4"   },
  { title: "Sapphire Room Flicker", file: "SapphireRoom.mp4" },
  { title: "Tarot Trailer Vibe",    file: "TarotTrailer.mp4" },
];

let current = 0;
let playing = true;
let elapsed = 0;
let tickRef = null;

const vid          = document.getElementById("vid");
const placeholder  = document.getElementById("placeholder");
const clipLabel    = document.getElementById("clipLabel");
const progressFill = document.getElementById("progressFill");
const thumbRow     = document.getElementById("thumbRow");
const durationSelect = document.getElementById("durationSelect");
const btnPlay      = document.getElementById("btnPlay");

function duration() { return parseInt(durationSelect.value, 10) * 1000; }

function buildThumbs() {
  thumbRow.innerHTML = "";
  CLIPS.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = "thumb" + (i === current ? " active" : "");
    el.innerHTML = `<div class="thumb-num">${i + 1}</div><div class="thumb-title">${c.title}</div>`;
    el.addEventListener("click", () => goTo(i));
    thumbRow.appendChild(el);
  });
}

function loadClip(idx) {
  document.querySelectorAll(".thumb").forEach((t, i) => t.classList.toggle("active", i === idx));
  clipLabel.textContent = CLIPS[idx].title;
  placeholder.style.display = "none";
  vid.style.display = "block";
  vid.src = BASE + CLIPS[idx].file;
  vid.play().catch(() => {});
}

function goTo(idx) {
  current = idx;
  elapsed = 0;
  progressFill.style.width = "0%";
  loadClip(current);
  resetTick();
}

function advance() {
  goTo((current + 1) % CLIPS.length);
}

function resetTick() {
  clearInterval(tickRef);
  if (!playing) return;
  const d = duration();
  tickRef = setInterval(() => {
    elapsed += 100;
    progressFill.style.width = Math.min((elapsed / d) * 100, 100) + "%";
    if (elapsed >= d) { elapsed = 0; advance(); }
  }, 100);
}

vid.addEventListener("ended", () => advance());

durationSelect.addEventListener("change", () => {
  elapsed = 0;
  progressFill.style.width = "0%";
  resetTick();
});

btnPlay.addEventListener("click", () => {
  playing = !playing;
  btnPlay.textContent = playing ? "⏸ Pause" : "▶ Play";
  if (playing) { resetTick(); vid.play().catch(() => {}); }
  else { clearInterval(tickRef); vid.pause(); }
});

buildThumbs();
loadClip(0);
resetTick();
</script>
</body>
</html>
