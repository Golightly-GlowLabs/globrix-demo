<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GloBrix Quick Start</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background: rgba(5, 2, 18, 0.62);
    cursor: pointer;
    transition: opacity 0.5s ease;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title {
    font-size: clamp(20px, 4vw, 38px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #e8e0ff;
    text-align: center;
    text-shadow: 0 2px 24px rgba(120, 60, 255, 0.6);
    padding: 0 24px;
    line-height: 1.3;
  }

  .title span { color: #c4a5ff; }

  .play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2.5px solid rgba(196, 165, 255, 0.8);
    background: rgba(120, 60, 255, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }

  .play-btn:hover {
    background: rgba(120, 60, 255, 0.38);
    transform: scale(1.08);
  }

  .play-btn svg {
    width: 32px;
    height: 32px;
    fill: #e8e0ff;
  }

  /* Pause icon — two bars */
  .pause-btn svg {
    width: 28px;
    height: 28px;
    fill: #e8e0ff;
    margin-left: 0;
  }

  .hint {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(196, 165, 255, 0.5);
  }

  /* Pause overlay — shows briefly on click during playback */
  #pauseOverlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: rgba(5, 2, 18, 0.55);
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  #pauseOverlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .countdown {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(196, 165, 255, 0.45);
  }
</style>
</head>
<body>

<video id="vid" playsinline></video>

<!-- Start screen -->
<div id="overlay">
  <div class="title"><span>GloBrix</span> Easy Set Up!</div>
  <div class="play-btn">
    <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
  </div>
  <div class="hint">Click to play</div>
</div>

<!-- Pause screen -->
<div id="pauseOverlay">
  <div class="title"><span>GloBrix</span> Easy Set Up!</div>
  <div class="play-btn pause-btn">
    <svg viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
  </div>
  <div class="hint">Click to resume</div>
  <div class="countdown" id="countdown"></div>
</div>

<script>
const vid          = document.getElementById("vid");
const overlay      = document.getElementById("overlay");
const pauseOverlay = document.getElementById("pauseOverlay");
const countdown    = document.getElementById("countdown");

const IDLE_TIMEOUT = 10 * 60; // 10 minutes in seconds
let idleSeconds = 0;
let idleTimer   = null;
let state       = "start"; // "start" | "playing" | "paused"

vid.src = "https://pub-97d11057786548c6948476edd0bc17eb.r2.dev/GlobrixEasySetUp.mp4";

function showStart() {
  state = "start";
  stopIdleTimer();
  overlay.classList.remove("hidden");
  pauseOverlay.classList.remove("visible");
  vid.pause();
  vid.currentTime = 0;
}

function startPlaying() {
  state = "playing";
  stopIdleTimer();
  overlay.classList.add("hidden");
  pauseOverlay.classList.remove("visible");
  vid.play();
}

function pauseVideo() {
  state = "paused";
  vid.pause();
  pauseOverlay.classList.add("visible");
  startIdleTimer();
}

function startIdleTimer() {
  stopIdleTimer();
  idleSeconds = 0;
  updateCountdown();
  idleTimer = setInterval(() => {
    idleSeconds++;
    updateCountdown();
    if (idleSeconds >= IDLE_TIMEOUT) {
      showStart();
    }
  }, 1000);
}

function stopIdleTimer() {
  clearInterval(idleTimer);
  idleTimer = null;
  idleSeconds = 0;
  countdown.textContent = "";
}

function updateCountdown() {
  const remaining = IDLE_TIMEOUT - idleSeconds;
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  countdown.textContent = "Returning to start in " + m + ":" + (s < 10 ? "0" : "") + s;
}

// Start screen click → play
overlay.addEventListener("click", () => {
  startPlaying();
});

// Click during playback → pause
vid.addEventListener("click", () => {
  if (state === "playing") pauseVideo();
});

// Pause screen click → resume
pauseOverlay.addEventListener("click", () => {
  startPlaying();
});

// Video ends → back to start screen
vid.addEventListener("ended", () => {
  showStart();
});
</script>
</body>
</html>
