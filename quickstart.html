<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GloBrix Quick Start</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Overlay sits on top of the video */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background: rgba(5, 2, 18, 0.62);
    cursor: pointer;
    transition: opacity 0.5s ease;
  }

  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title {
    font-size: clamp(20px, 4vw, 38px);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #e8e0ff;
    text-align: center;
    text-shadow: 0 2px 24px rgba(120, 60, 255, 0.6);
    padding: 0 24px;
    line-height: 1.3;
  }

  .title span {
    color: #c4a5ff;
  }

  .play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2.5px solid rgba(196, 165, 255, 0.8);
    background: rgba(120, 60, 255, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }

  .play-btn:hover {
    background: rgba(120, 60, 255, 0.38);
    transform: scale(1.08);
  }

  .play-btn svg {
    width: 32px;
    height: 32px;
    fill: #e8e0ff;
    margin-left: 5px; /* optical center for triangle */
  }

  .hint {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(196, 165, 255, 0.5);
  }
</style>
</head>
<body>

<video id="vid" playsinline></video>

<div id="overlay">
  <div class="title"><span>GloBrix</span> Easy Set Up!</div>
  <div class="play-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="5,3 19,12 5,21"/>
    </svg>
  </div>
  <div class="hint">Click to play</div>
</div>

<script>
const vid     = document.getElementById("vid");
const overlay = document.getElementById("overlay");

vid.src = "https://pub-97d11057786548c6948476edd0bc17eb.r2.dev/GlobrixEasySetUp.mp4";

overlay.addEventListener("click", () => {
  overlay.classList.add("hidden");
  vid.play();
});

vid.addEventListener("ended", () => {
  overlay.classList.remove("hidden");
});
</script>
</body>
</html>
